<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#050505" />
  <title>Score Tracker</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #101010;
      --panel-alt: #0b0b0b;
      --line: rgba(255, 255, 255, 0.2);
      --text: #fff;
      --minus: rgba(255, 80, 80, 0.34);
      --plus: rgba(80, 255, 140, 0.34);
      --minus-active: rgba(255, 80, 80, 0.55);
      --plus-active: rgba(80, 255, 140, 0.55);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Impact, Haettenschweiler, "Arial Black", "Franklin Gothic Heavy", system-ui, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
      overscroll-behavior: none;
    }

    button {
      font: inherit;
      color: inherit;
      border: 0;
      background: none;
      padding: 0;
      cursor: pointer;
    }

    .app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: radial-gradient(circle at center, #151515 0%, #050505 62%);
      display: grid;
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      overflow: hidden;
    }

    .half {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--panel);
      min-height: 0;
    }

    .half.top {
      transform: rotate(180deg);
      background: var(--panel-alt);
    }

    .half.bottom {
      border-top: 3px solid var(--line);
    }

    .score {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      color: var(--text);
      font-size: clamp(7.5rem, 39vw, 23rem);
      font-weight: 1000;
      line-height: 0.82;
      letter-spacing: -0.035em;
      text-shadow: 0 0 1.6rem rgba(255, 255, 255, 0.2);
      font-variant-numeric: tabular-nums;
    }

    .touch-zone {
      position: relative;
      z-index: 1;
      height: 100%;
      min-width: 50vw;
      background: transparent;
    }

    .touch-zone::before {
      content: attr(data-symbol);
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(6rem, 28vw, 17rem);
      font-weight: 1000;
      line-height: 1;
      text-shadow: 0 0 1rem currentColor;
    }

    .touch-zone[data-action="decrement"]::before { color: var(--minus); }
    .touch-zone[data-action="increment"]::before { color: var(--plus); }
    .touch-zone[data-action="decrement"]:active::before { color: var(--minus-active); }
    .touch-zone[data-action="increment"]:active::before { color: var(--plus-active); }

    .touch-zone:first-child {
      border-right: 1px solid rgba(255, 255, 255, 0.08);
    }

    .center-bar {
      position: fixed;
      left: 0;
      right: 0;
      top: 50%;
      z-index: 10;
      height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transform: translateY(-1.5px);
    }

    .reset-button {
      pointer-events: auto;
      width: clamp(3.2rem, 15vw, 5rem);
      height: clamp(3.2rem, 15vw, 5rem);
      border-radius: 999px;
      background: #fff;
      color: #050505;
      border: 0.24rem solid #050505;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2), 0 0.55rem 1.5rem rgba(0, 0, 0, 0.6);
      font-family: system-ui, sans-serif;
      font-size: clamp(0.72rem, 3vw, 1rem);
      font-weight: 1000;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .reset-button:active {
      transform: scale(0.96);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(0.25rem);
    }

    .modal-backdrop.show {
      display: block;
    }

    .confirm-panel {
      position: absolute;
      left: 50%;
      bottom: max(2rem, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(92vw, 28rem);
      padding: 1rem;
      border-radius: 1.25rem;
      background: #f7f7f7;
      color: #050505;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.65);
    }

    .confirm-panel h2 {
      margin: 0 0 0.35rem;
      font-size: 1.25rem;
      line-height: 1.1;
      font-weight: 1000;
    }

    .confirm-panel p {
      margin: 0 0 1rem;
      color: #333;
      font-size: 1rem;
      line-height: 1.35;
      font-weight: 650;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .modal-actions button {
      min-height: 3.25rem;
      border-radius: 0.9rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 1rem;
      font-weight: 1000;
    }

    .cancel-button {
      background: #d8d8d8;
      color: #050505;
    }

    .confirm-button {
      background: #050505;
      color: #fff;
    }

    @media (display-mode: browser) {
      body::before {
        content: "For true fullscreen: open the browser menu and choose Add to Home screen, then launch from the icon.";
        position: fixed;
        left: 0.5rem;
        right: 0.5rem;
        top: max(0.5rem, env(safe-area-inset-top));
        z-index: 60;
        padding: 0.45rem 0.6rem;
        border-radius: 0.7rem;
        background: rgba(255, 255, 255, 0.88);
        color: #050505;
        font-family: system-ui, sans-serif;
        font-size: 0.78rem;
        font-weight: 800;
        text-align: center;
        opacity: 0.9;
      }
    }

    @media (orientation: landscape) {
      .app::after {
        content: "Rotate to portrait";
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050505;
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: clamp(1.6rem, 6vw, 4rem);
        font-weight: 1000;
        text-align: center;
        padding: 2rem;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Two-player scoring tracker">
    <section class="half top" aria-label="Far player score controls">
      <button class="touch-zone" data-player="top" data-action="decrement" data-symbol="−" aria-label="Decrease far player score"></button>
      <button class="touch-zone" data-player="top" data-action="increment" data-symbol="+" aria-label="Increase far player score"></button>
      <div class="score" id="topScore" aria-live="polite">50</div>
    </section>

    <section class="half bottom" aria-label="Near player score controls">
      <button class="touch-zone" data-player="bottom" data-action="decrement" data-symbol="−" aria-label="Decrease near player score"></button>
      <button class="touch-zone" data-player="bottom" data-action="increment" data-symbol="+" aria-label="Increase near player score"></button>
      <div class="score" id="bottomScore" aria-live="polite">50</div>
    </section>
  </main>

  <div class="center-bar">
    <button class="reset-button" id="resetButton" aria-haspopup="dialog" aria-controls="confirmModal">Reset</button>
  </div>

  <div class="modal-backdrop" id="confirmModal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="confirm-panel">
      <h2 id="confirmTitle">Reset scores?</h2>
      <p>This will set both players back to 50.</p>
      <div class="modal-actions">
        <button class="cancel-button" id="cancelReset">Cancel</button>
        <button class="confirm-button" id="confirmReset">Yes, reset</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const DEFAULT_SCORE = 50;
      const MIN_SCORE = 0;
      const MAX_SCORE = 99;
      const STORAGE_KEY = "twoPlayerScoreTracker.v1";

      const topScoreEl = document.getElementById("topScore");
      const bottomScoreEl = document.getElementById("bottomScore");
      const resetButton = document.getElementById("resetButton");
      const modal = document.getElementById("confirmModal");
      const cancelReset = document.getElementById("cancelReset");
      const confirmReset = document.getElementById("confirmReset");

      let scores = loadScores();
      let pointerStarts = new Map();

      function clampScore(value) {
        return Math.max(MIN_SCORE, Math.min(MAX_SCORE, Number(value) || 0));
      }

      function loadScores() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          return {
            top: clampScore(saved?.top ?? DEFAULT_SCORE),
            bottom: clampScore(saved?.bottom ?? DEFAULT_SCORE)
          };
        } catch {
          return { top: DEFAULT_SCORE, bottom: DEFAULT_SCORE };
        }
      }

      function saveScores() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
      }

      function render() {
        topScoreEl.textContent = String(scores.top).padStart(2, "0");
        bottomScoreEl.textContent = String(scores.bottom).padStart(2, "0");
      }

      function changeScore(player, delta) {
        scores[player] = clampScore(scores[player] + delta);
        saveScores();
        render();
      }

      function resetScores() {
        scores = { top: DEFAULT_SCORE, bottom: DEFAULT_SCORE };
        saveScores();
        render();
      }

      function openModal() {
        modal.classList.add("show");
        confirmReset.focus({ preventScroll: true });
      }

      function closeModal() {
        modal.classList.remove("show");
        resetButton.focus({ preventScroll: true });
      }

      document.querySelectorAll(".touch-zone").forEach((button) => {
        button.addEventListener("pointerdown", (event) => {
          pointerStarts.set(event.pointerId, {
            x: event.clientX,
            y: event.clientY,
            t: performance.now()
          });
        }, { passive: true });

        button.addEventListener("pointerup", (event) => {
          const start = pointerStarts.get(event.pointerId);
          pointerStarts.delete(event.pointerId);
          if (!start) return;

          const elapsed = performance.now() - start.t;
          const moved = Math.hypot(event.clientX - start.x, event.clientY - start.y);

          // A deliberate long press should do nothing. This also avoids repeat scoring.
          if (elapsed > 420 || moved > 28) return;

          const player = button.dataset.player;
          const delta = button.dataset.action === "increment" ? 1 : -1;
          changeScore(player, delta);
        }, { passive: true });

        button.addEventListener("pointercancel", (event) => {
          pointerStarts.delete(event.pointerId);
        }, { passive: true });

        button.addEventListener("contextmenu", (event) => {
          event.preventDefault();
        });
      });

      resetButton.addEventListener("click", openModal);
      cancelReset.addEventListener("click", closeModal);
      confirmReset.addEventListener("click", () => {
        resetScores();
        closeModal();
      });

      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeModal();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && modal.classList.contains("show")) {
          closeModal();
        }
      });

      render();
    })();
  </script>
</body>
</html>
